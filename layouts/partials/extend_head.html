{{- if .Page.Store.Get "hasMermaid" }}
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
mermaid.initialize({
  startOnLoad: false,
  securityLevel: 'loose',
  theme: document.documentElement.classList.contains('dark') ? 'dark' : 'default',
  flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' },
  themeVariables: { fontSize: '14px' }
});

function runMermaid() {
  mermaid.run({ querySelector: 'pre.mermaid:not([data-processed])' }).then(function() {
    document.querySelectorAll('pre.mermaid .nodeLabel div, pre.mermaid .nodeLabel p').forEach(function(el) {
      el.style.maxWidth = 'none';
    });
  });
}

document.addEventListener('DOMContentLoaded', function() {
  runMermaid();
  // Re-render mermaid inside details when they open
  document.addEventListener('toggle', function(e) {
    if (e.target.open) {
      setTimeout(runMermaid, 50);
    }
  });
});
</script>
{{- end }}
